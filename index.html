<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraCanvas - Login & Register</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>if(localStorage.getItem('aura_theme') === 'light'){document.documentElement.setAttribute('data-theme', 'light');}</script>
</head>
<body>

<div class="auth-wrapper" style="background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center/cover;">
    <!-- Dark transparent overlay with blur -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); z-index: 1;"></div>
    
    <!-- Floating Gradient Orbs -->
    <div class="auth-bg-anim" style="background: var(--primary); top: -10%; left: -10%; width: 50vw; height: 50vw; animation-duration: 25s; opacity: 0.4; z-index: 2;"></div>
    <div class="auth-bg-anim" style="background: var(--accent); bottom: -20%; right: -10%; width: 40vw; height: 40vw; animation-duration: 18s; animation-direction: alternate-reverse; opacity: 0.3; z-index: 2;"></div>
    <div class="auth-bg-anim" style="background: #e020a1; top: 40%; left: 60%; width: 30vw; height: 30vw; animation-duration: 22s; opacity: 0.2; z-index: 2;"></div>

    <div class="auth-box glass" style="position: relative; z-index: 10; padding: 50px 40px; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15); background: rgba(15, 15, 20, 0.65); max-width: 450px;">
        <h1 style="font-size: 3rem; margin-bottom: 5px; background: linear-gradient(45deg, var(--accent), var(--primary-hover)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">AuraCanvas <i class="fas fa-paint-brush" style="font-size: 2.2rem; color: var(--accent); -webkit-text-fill-color: var(--accent);"></i></h1>
        <p id="authSubtitle" style="font-size: 1.1rem; color: #d1d5db; margin-bottom: 35px; letter-spacing: 0.5px;">Empower your creativity. Sign in to continue.</p>

        <div id="loginForm">
            <div class="input-group">
                <label style="font-weight: 600; font-size: 0.9rem; color: #e5e7eb; margin-bottom: 10px;">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="email" id="loginEmail" class="input-field" placeholder="artist@auracanvas.com" style="padding-left: 45px; background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.2);">
                </div>
            </div>
            <div class="input-group">
                <label style="font-weight: 600; font-size: 0.9rem; color: #e5e7eb; margin-bottom: 10px;">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" style="padding-left: 45px; background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.2);">
                </div>
            </div>
            <button class="btn btn-accent" style="width: 100%; justify-content: center; font-size: 1.1rem; padding: 12px; margin-top: 10px; border-radius: 12px; font-weight: 700; box-shadow: 0 10px 20px rgba(0, 245, 212, 0.3);" onclick="handleLogin()">Sign In <i class="fas fa-arrow-right"></i></button>
            <p class="error-msg" id="loginError" style="font-weight: 600;"></p>
            <p style="margin-top: 15px; color: #9ca3af; font-size: 0.95rem;">New here? <span class="toggle-link" onclick="toggleAuth('register')" style="color: var(--accent); font-weight: 600; text-decoration: none; cursor: pointer;">Create an account</span></p>
        </div>

        <div id="registerForm" style="display: none;">
            <div class="input-group">
                <label style="font-weight: 600; font-size: 0.9rem; color: #e5e7eb; margin-bottom: 10px;">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" id="regUsername" class="input-field" placeholder="CreativeHero" style="padding-left: 45px; background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.2);">
                </div>
            </div>
            <div class="input-group">
                <label style="font-weight: 600; font-size: 0.9rem; color: #e5e7eb; margin-bottom: 10px;">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="email" id="regEmail" class="input-field" placeholder="artist@auracanvas.com" style="padding-left: 45px; background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.2);">
                </div>
            </div>
            <div class="input-group">
                <label style="font-weight: 600; font-size: 0.9rem; color: #e5e7eb; margin-bottom: 10px;">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" id="regPassword" class="input-field" placeholder="••••••••" style="padding-left: 45px; background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.2);">
                </div>
            </div>
            <button class="btn btn-accent" style="width: 100%; justify-content: center; font-size: 1.1rem; padding: 12px; margin-top: 10px; border-radius: 12px; font-weight: 700; box-shadow: 0 10px 20px rgba(0, 245, 212, 0.3);" onclick="handleRegister()">Sign Up <i class="fas fa-check"></i></button>
            <p class="error-msg" id="regError" style="font-weight: 600;"></p>
            <p style="margin-top: 15px; color: #9ca3af; font-size: 0.95rem;">Already have an account? <span class="toggle-link" onclick="toggleAuth('login')" style="color: var(--accent); font-weight: 600; text-decoration: none; cursor: pointer;">Sign in</span></p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

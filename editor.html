<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraCanvas - Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Moveable for Elite Object Manipulation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moveable/0.50.0/moveable.min.js"></script>
    <!-- HTML2Canvas for accurate export with transforms -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

    <header class="action-bar topbar" style="padding: 10px 20px;">
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="brand" style="font-size: 1.2rem; margin-right: 20px; cursor: pointer;"
                onclick="window.location.href='home.html'">
                <i class="fas fa-home"></i> AuraCanvas
            </div>
            <input type="text" id="documentName" class="input-field" value="Untitled Canvas"
                style="width: 250px; padding: 8px 14px; background: rgba(0,0,0,0.1); border: 1px solid var(--border-glass);">
        </div>

        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="theme-switch-wrapper" style="margin-right: 15px;" title="Toggle Light/Dark Mode">
                <i class="fas fa-moon" style="color: var(--text-muted); font-size: 0.9rem;"></i>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" onchange="toggleTheme(event)" />
                    <div class="slider round"></div>
                </label>
                <i class="fas fa-sun" style="color: var(--text-muted); font-size: 0.9rem;"></i>
            </div>

            <button class="btn btn-icon" onclick="undo()" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></button>
            <button class="btn btn-icon" onclick="redo()" title="Redo (Ctrl+Y)"><i class="fas fa-redo"></i></button>
            <button class="btn" onclick="saveToHistory()"><i class="fas fa-save"></i> Save</button>
            <button class="btn btn-accent" onclick="downloadImage()" title="Export Composed Image (PNG)"><i class="fas fa-image"></i> Export PNG</button>
            <button class="btn" id="recordBtn" onclick="toggleRecordVideo()" title="Export Animated Video" style="background: rgba(239,71,111,0.2); color: var(--danger);"><i class="fas fa-video"></i> Video</button>
        </div>
    </header>

    <div class="editor-layout">
        <!-- Left Toolbar: Tools & Shapes -->
        <div class="toolbar-left glass" style="border-radius: 0;">
            <button class="btn-icon active" title="Brush" data-tool="brush"><i class="fas fa-paint-brush"></i></button>
            <button class="btn-icon" title="Eraser" data-tool="eraser"><i class="fas fa-eraser"></i></button>
            <button class="btn-icon" title="Fill Bucket" data-tool="fill"><i class="fas fa-fill-drip"></i></button>
            <button class="btn-icon" title="Spray" data-tool="spray"><i class="fas fa-spray-can"></i></button>
            <button class="btn-icon" title="Neon Glow" data-tool="neon"><i class="fas fa-lightbulb"></i></button>
            <button class="btn-icon" title="Select Canvas Area" data-tool="select"><i class="fas fa-vector-square"></i></button>

            <div style="margin: 15px 0; width: 100%; height: 2px; background: var(--border-glass);"></div>

            <select id="shapeSelect" class="input-field tooltip" title="Select a Shape" style="width: 100%; padding: 8px; font-family: var(--font-sans); font-weight: 600; background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-glass); border-radius: 8px; margin-bottom: 5px; font-size: 0.9rem; cursor:pointer;">
                <option value="" disabled selected>Select Shape</option>
                <option value="line">📏 Line</option>
                <option value="curve">➰ Curve</option>
                <option value="circle">⭕ Circle</option>
                <option value="oval">⬭ Oval</option>
                <option value="rectangle">▭ Rectangle</option>
                <option value="square">⬜ Square</option>
                <option value="rounded_rectangle">▢ Rounded Rect</option>
                <option value="polygon">⬠ Polygon</option>
                <option value="triangle">△ Triangle</option>
                <option value="diamond">◇ Diamond</option>
                <option value="arrow">➔ Arrow</option>
                <option value="star">⭐ Star</option>
                <option value="bullet">💊 Bullet</option>
                <option value="heart">❤️ Heart</option>
            </select>

            <div style="margin: 15px 0; width: 100%; height: 2px; background: var(--border-glass);"></div>

            <button class="btn-icon" title="Insert Local Image" onclick="document.getElementById('imgUpload').click()"><i class="fas fa-image"></i></button>
            <button class="btn-icon" title="Insert Image from URL" onclick="addImageFromUrl()"><i class="fas fa-link"></i></button>
            <input type="file" id="imgUpload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            
            <div style="margin: 15px 0; width: 100%; height: 2px; background: var(--border-glass);"></div>
            <button class="btn-icon" title="Clear Canvas" onclick="clearCanvas()"><i class="fas fa-trash-alt" style="color: var(--danger);"></i></button>
        </div>

        <!-- Workspace: Canvas & Overlay -->
        <div class="workspace" id="workspace">
            <div id="pagesContainer" style="display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 40px 0; width: 100%;">
                <div class="canvas-wrapper" style="width: 800px; height: 600px;">
                    <!-- The main canvas for paint logic -->
                    <canvas class="main-canvas" width="800" height="600" style="position: absolute; top:0; left:0; z-index: 1;"></canvas>
                    <canvas class="temp-canvas" width="800" height="600" style="position: absolute; top:0; left:0; z-index: 2; pointer-events: none;"></canvas>
                    
                    <!-- Separate interaction layer for Drag/Resize Objects -->
                    <div class="overlay-container" id="currentOverlay" style="position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 5; pointer-events: none;">
                    </div>
                </div>
            </div>
            <button class="btn" style="margin-bottom: 40px; border: 1px dashed var(--accent); background: var(--accent-glow); color: var(--text-main);" onclick="addPage()">
                <i class="fas fa-plus"></i> Add New Page
            </button>
        </div>

        <!-- Right Toolbar: Properties & Animations -->
        <div class="toolbar-right glass" style="border-radius: 0;">
            <div class="control-group">
                <label>Stroke Color</label>
                <input type="color" id="strokeColor" value="#ffffff">
            </div>

            <div class="control-group">
                <label>Fill Color <span style="font-size: 0.7rem; color: var(--text-muted);">(Shapes/Text)</span></label>
                <input type="color" id="fillColor" value="#9d4edd">
            </div>

            <div class="control-group">
                <label>Stroke / Text Size <span id="strokeValue" style="color: var(--accent);">5</span></label>
                <input type="range" id="lineWidth" min="1" max="100" value="5" oninput="document.getElementById('strokeValue').innerText = this.value">
            </div>

            <div class="control-group">
                <label>Eraser Size <span id="eraserValue" style="color: var(--accent);">20</span></label>
                <input type="range" id="eraserWidth" min="1" max="150" value="20" oninput="document.getElementById('eraserValue').innerText = this.value">
            </div>

            <hr style="border-color: var(--border-glass); margin: 25px 0;">

            <!-- Add Overlay Text / Image Editing -->
            <h4 style="font-family: var(--font-heading); margin-bottom: 15px; color: var(--text-main); font-weight: 700;">
                <i class="fas fa-layer-group" style="color: var(--accent); margin-right: 5px;"></i> Overlay Elements
            </h4>

            <div class="control-group">
                <label>Add Dynamic Text</label>
                <input type="text" id="animTextInput" class="input-field" placeholder="Enter text or emoji..." style="margin-bottom: 10px;">
                <select id="animFont" class="input-field" style="margin-bottom: 10px;">
                    <option value="var(--font-sans)">Sans-serif (Modern)</option>
                    <option value="var(--font-heading)">Heading (Bold)</option>
                    <option value="'Courier New', Courier, monospace">Monospace</option>
                    <option value="'Brush Script MT', cursive">Cursive / Script</option>
                    <option value="'Times New Roman', Times, serif">Serif Classic</option>
                </select>
                <select id="animType" class="input-field" style="margin-bottom: 10px;">
                    <option value="none">No Animation</option>
                    <option value="anim-bounce">Bounce Loop</option>
                    <option value="anim-spin">Continuous Spin</option>
                    <option value="anim-pulse">Pulsing Effect</option>
                </select>
                <button class="btn btn-accent" style="width: 100%; justify-content: center;" onclick="addAnimElement()">Add Object</button>
            </div>

            <!-- Dynamic panels shown only when certain elements are selected -->
            <div class="control-group filters-panel" id="objectPropsPanel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <label style="margin:0; color:var(--accent);">Object Controls</label>
                    <button class="btn-icon" style="width:28px; height:28px; font-size: 0.8rem; background: rgba(255,0,110,0.1); border-color: var(--danger); color: var(--danger);" onclick="deleteSelectedObject()" title="Delete Selected Layer">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                
                <div id="textOnlyProps" style="display: none;">
                    <label>Text Color</label>
                    <input type="color" id="editTextColor" oninput="updateTextProps()">
                    
                    <label style="margin-top:10px;">Font Size: <span id="editFontSizeVal">20px</span></label>
                    <input type="range" id="editFontSize" min="10" max="200" value="20" oninput="updateTextProps()">
                </div>

                <div id="imageFilters" style="display: none;">
                    <label>Brightness: <span id="brightVal">100%</span></label>
                    <input type="range" id="filterBrightness" min="0" max="200" value="100" oninput="updateFilters()">
                    
                    <label style="margin-top:10px;">Contrast: <span id="contVal">100%</span></label>
                    <input type="range" id="filterContrast" min="0" max="200" value="100" oninput="updateFilters()">
                    
                    <label style="margin-top:10px;">Saturation: <span id="satVal">100%</span></label>
                    <input type="range" id="filterSaturate" min="0" max="200" value="100" oninput="updateFilters()">

                    <button class="btn" style="width: 100%; justify-content: center; margin-top: 15px; border: 1px dashed var(--accent); background: transparent; color: var(--text-main);" onclick="toggleCropMode()" id="cropBtn">
                        <i class="fas fa-crop-alt"></i> Toggle Crop Mode
                    </button>
                </div>

                <!-- Shared properties for Animatable Layers -->
                <div id="sharedProps" style="margin-top:20px; border-top: 1px solid var(--border-glass); padding-top: 15px; display: none;">
                    <label>Animation (Live)</label>
                    <select id="editObjectAnim" class="input-field" style="padding: 8px;" onchange="updateObjectAnim()">
                        <option value="none">No Animation</option>
                        <option value="anim-bounce">Bounce Loop</option>
                        <option value="anim-spin">Continuous Spin</option>
                        <option value="anim-pulse">Pulsing Effect</option>
                    </select>
                </div>
            </div>

            <p style="font-size: 0.8rem; color: var(--text-muted); line-height: 1.5;">
                <b>Hint:</b> Click texts and images to move, resize <i class="fas fa-arrows-alt"></i> and rotate them!
            </p>

        </div>
    </div>

    <!-- Script dependencies handled at top and bottom. -->
    <script src="editor.js"></script>
</body>

</html>

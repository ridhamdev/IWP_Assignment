<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraCanvas - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<header class="topbar">
    <div class="brand">AuraCanvas</div>
    <div>
        <span id="userNameDisplay" style="margin-right: 20px;"></span>
        <button class="btn btn-icon" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
    </div>
</header>

<div class="dashboard-content">
    <div class="hero-section">
        <h2>What will you design today?</h2>
        <div style="max-width: 600px; margin: 20px auto; position: relative;">
            <input type="text" id="searchInput" class="input-field" placeholder="Search your projects or templates..." style="padding-left: 40px; border-radius: 30px;" oninput="filterSearch()">
            <i class="fas fa-search" style="position: absolute; left: 15px; top: 15px; color: var(--text-muted);"></i>
        </div>
        <button class="btn btn-accent" onclick="openEditor('blank')" style="margin-top: 20px; font-size: 1.1rem; padding: 12px 30px;">
            <i class="fas fa-plus"></i> Create Blank Canvas
        </button>
    </div>

    <div class="section-title">
        <i class="fas fa-history"></i> Your Recent Designs
    </div>
    <div class="grid-layout" id="historyGrid">
        <!-- History items will be injected here via JS -->
    </div>

    <div class="section-title" style="margin-top: 50px;">
        <i class="fas fa-magic"></i> Start from a Template
    </div>
    <div class="grid-layout" id="templateGrid">
        <!-- Rendered via JS -->
    </div>
</div>

<script src="home.js"></script>
</body>
</html>
